<html
        lang="en"
        data-namespace-typo3-fluid="true"
        xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
        xmlns:be="http://typo3.org/ns/TYPO3/CMS/Beuser/ViewHelpers"
        xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers">

  <f:image src="EXT:tonictypes/Resources/Public/Icons/Plugins/Detail.svg" style="float:left;margin-right: 5px;" height="32" title="Tonictypes Plugin"/>
  <f:image src="EXT:tonictypes/Resources/Public/Images/logo_tonictypes.svg" style="float:right;" width="100" title="Tonictypes"/>
  <strong>
    <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:plugin.detail"/>
  </strong>
  <br/>
  <div style="font-size: smaller;">
    <span data-toggle="tooltip" data-html="true" data-placement="right"
          data-title="{f:translate(key:'LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:message.use_this_id_to_link')}" style="cursor:help; color:#F29402; font-weight: bold;">[Uid <strong
            style="color:white; background-color:#F29402; padding:4px;">{record.uid}</strong>]</span>
    <hr size="1" style="color:#c0c0c0; background-color: #c0c0c0; height: 1px; padding:0; margin: 5px 0;"/>
  </div>
  <div style="margin:5px 0;">
    <table class="table table-hover table-striped table-bordered" style="font-size: smaller;">
      <tr>
        <td>
          <strong>
            <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:tx_tonictypes_domain_model_datatype"/>
          </strong>
        </td>
        <td>
          <f:render section="datatype" arguments="{_all}"/>
        </td>
      </tr>
      <tr>
        <td>
          <strong>
            <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:tx_tonictypes_domain_model_record"/>
          </strong>
        </td>
        <td>
          <f:render section="record" arguments="{_all}"/>
        </td>
      </tr>
      <tr>
        <td>
          <strong>
            <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:preview.data_source"/>
          </strong>
        </td>
        <td>
          <f:render section="pages" arguments="{_all}"/>
        </td>
      </tr>
      <f:if condition="{record.pi_flexform.sheets.template_settings.settings.variables}">
        <f:then>
          <tr>
            <td>
              <strong>
                <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:preview.variables"/>
              </strong>
            </td>
            <td>
              <f:render section="variables" arguments="{_all}"/>
            </td>
          </tr>
        </f:then>
      </f:if>
      <tr>
        <td>
          <strong>
            <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:preview.template"/>
          </strong>
        </td>
        <td style="word-break: break-all;">
          <f:render section="template" arguments="{_all}"/>
        </td>
      </tr>
    </table>
  </div>

  <f:section name="datatype">
    <f:if condition="{pi_flexform_transformed.settings.datatype_selection} > 0">
      <f:then>
        <a href="{dv:backend.editLink(id:pi_flexform_transformed.settings.datatype_selection,table:'tx_tonictypes_domain_model_datatype')}" target="_self"
           data-table="tx_tonictypes_domain_model_datatype" data-uid="{pi_flexform_transformed.settings.datatype_selection}" class="t3js-contextmenutrigger">
          <dv:backend.render.record uid="{pi_flexform_transformed.settings.datatype_selection}" table="tx_tonictypes_domain_model_datatype"/>
        </a>
      </f:then>
      <f:else>
        <em>
          <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:datatype_not_selected"/>
        </em>
      </f:else>
    </f:if>
  </f:section>

  <f:section name="record">
    <f:if condition="{pi_flexform_transformed.settings.single_record_selection} > 0">
      <f:then>
        <f:alias map="{datatype:'{dv:datatype.get(uid:pi_flexform_transformed.settings.datatype_selection,onlyEnabled:0)}'}">
          <a href="{dv:backend.editLink(id:pi_flexform_transformed.settings.single_record_selection,table:datatype.tablename)}" target="_self" data-table="{datatype.tablename}"
             data-uid="{pi_flexform_transformed.settings.single_record_selection}" class="t3js-contextmenutrigger">
            <dv:backend.render.record uid="{pi_flexform_transformed.settings.single_record_selection}" table="{datatype.tablename}"/>
          </a>
        </f:alias>
      </f:then>
      <f:else>
        <em>
          <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:record_not_selected"/>
        </em>
      </f:else>
    </f:if>
  </f:section>

  <f:section name="pages">
    <f:if condition="{record.pages} != ''">
      <f:then>
        <f:alias map="{pageUids:'{dv:string.explode(string:record.pages)}'}">
          <f:for each="{pageUids}" as="pageUid" iteration="i">
            <a href="{dv:backend.webList(id:pageUid)}" target="_self">
              <dv:backend.render.record uid="{pageUid}" table="pages"/>
            </a>
            <f:if condition="!{i.isLast}">&nbsp;</f:if>
          </f:for>
        </f:alias>
      </f:then>
      <f:else>
        <em>
          <f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:message.no_record_storage_page_configured"/>
        </em>
      </f:else>
    </f:if>
  </f:section>

  <f:section name="variables">
    <f:for each="{record.pi_flexform.sheets.template_settings.settings.variables}" as="variable" iteration="i">
        <a href="{dv:backend.editLink(id:variable.uid,table:'tx_tonictypes_domain_model_variable')}" target="_self" data-table="tx_tonictypes_domain_model_variable" data-uid="{variable.uid}"
           class="t3js-contextmenutrigger">
          <dv:backend.render.record uid="{variable.uid}" table="tx_tonictypes_domain_model_variable"/>
        </a>
        <f:if condition="!{i.isLast}">&nbsp;</f:if>
      </f:for>
  </f:section>

  <f:section name="template">
    <f:switch expression="{record.pi_flexform.sheets.template_settings.settings.template_selection}">
      <f:case value="CUSTOM">
        <dv:backend.render.file table="tt_content" field="template_override" uid="{record.uid}"/>
      </f:case>
      <f:case value="FLUID">
        <core:icon identifier="mimetypes-text-html" size="small"/>&nbsp;<f:translate key="LLL:EXT:tonictypes/Resources/Private/Language/locallang.xlf:flexform.fluid"/>
      </f:case>
      <f:defaultCase>
        <dv:backend.render.templateFile id="{record.pi_flexform.sheets.template_settings.settings.template_selection}"/>
      </f:defaultCase>
    </f:switch>
  </f:section>

</html>
